name: Build And Publish Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-ffmpeg-service:
    name: ffmpeg-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image names
        id: images
        shell: bash
        run: |
          service="ffmpeg-service"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          echo "ghcr_image=ghcr.io/${owner}/${repo}/${service}" >> "$GITHUB_OUTPUT"

          default_branch="${{ github.event.repository.default_branch }}"
          acr_registry="${{ vars.ACR_REGISTRY }}"
          acr_namespace="${{ vars.ACR_NAMESPACE }}"
          acr_repository="${{ vars.ACR_REPOSITORY }}"
          if [ -n "$acr_registry" ] && [ -n "$acr_namespace" ]; then
            echo "acr_enabled=true" >> "$GITHUB_OUTPUT"
            if [ -n "$acr_repository" ]; then
              acr_image="${acr_registry}/${acr_namespace}/${acr_repository}"
              acr_tag_prefix="${service}-"
            else
              acr_image="${acr_registry}/${acr_namespace}/${service}"
              acr_tag_prefix=""
            fi

            ref_name="${GITHUB_REF_NAME//\//-}"
            acr_tags=("${acr_image}:${acr_tag_prefix}sha-${GITHUB_SHA::7}")
            acr_tags+=("${acr_image}:${acr_tag_prefix}${ref_name}")
            if [ "${GITHUB_REF_TYPE}" != "tag" ] && [ "${GITHUB_REF_NAME}" = "${default_branch}" ]; then
              acr_tags+=("${acr_image}:${acr_tag_prefix}latest")
            fi

            {
              echo "acr_tags<<EOF"
              printf "%s\n" "${acr_tags[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "acr_enabled=false" >> "$GITHUB_OUTPUT"
            echo "acr_tags=" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to ACR
        if: steps.images.outputs.acr_enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.ghcr_image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/ffmpeg-service
          file: services/ffmpeg-service/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.images.outputs.acr_tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ffmpeg-service
          cache-to: type=gha,mode=max,scope=ffmpeg-service

