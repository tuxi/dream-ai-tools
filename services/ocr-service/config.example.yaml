server:
  host: 0.0.0.0
  port: 8091

ocr:
  engine: paddleocr
  lang: ch
  use_gpu: false
  ocr_version: PP-OCRv4
  use_doc_orientation_classify: false
  use_doc_unwarping: false
  use_textline_orientation: false
  enable_mkldnn: false
  enable_hpi: false
  ir_optim: false
  cpu_threads: 2
  model_cache_dir: /models/paddleocr
  offline: false
  min_confidence: 0.6
  max_images_per_request: 120
  max_concurrency: 2
  dedupe: true
  dedupe_window_seconds: 2.0
  max_file_size_mb: 50

storage:
  allowed_roots:
    - /tmp
    - /data/media
