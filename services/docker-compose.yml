services:
  tts-worker:
    build: ./tts-worker
    restart: unless-stopped
    environment:
      - STORAGE_LOCAL_DIR=/data/tts/audio
    volumes:
      - tts-audio:/data/tts/audio
    networks:
      - tts-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  tts-service:
    build: ./tts-service
    restart: unless-stopped
    volumes:
      - tts-audio:/data/tts/audio
      - ./tts-service/config.yaml:/app/config.yaml:ro
    networks:
      - tts-net
    ports:
      - "8088:8088"
    depends_on:
      tts-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  tts-audio:

networks:
  tts-net:
    name: tts-net
    # ai-engine 容器加上 networks: [tts-net] 即可与 tts-service 互通
    # 或者将 ai-engine 的 compose 网络设置为 external: true 引用此网络
