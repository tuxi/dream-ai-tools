services:
  redis:
    image: redis:7-alpine
    container_name: tts-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - tts-redis-data:/data
    networks:
      - tts-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  tts-worker:
    build: ./tts-worker
    restart: unless-stopped
    environment:
      - STORAGE_LOCAL_DIR=/data/tts/audio
    volumes:
      - tts-audio:/data/tts/audio
    networks:
      - tts-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  tts-service:
    build: ./tts-service
    restart: unless-stopped
    volumes:
      - tts-audio:/data/tts/audio
      - ./tts-service/config.yaml:/app/config.yaml:ro
    networks:
      - tts-net
    ports:
      - "8088:8088"
    depends_on:
      redis:
        condition: service_healthy
      tts-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  tts-audio:
  tts-redis-data:

networks:
  tts-net:
    name: tts-net
