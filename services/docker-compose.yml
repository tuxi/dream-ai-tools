services:
  tts-worker:
    image: ${TOOLS_IMAGE_PREFIX}/tts-worker:${IMAGE_TAG:-latest}
    container_name: tools-tts-worker
    restart: unless-stopped
    environment:
      STORAGE_LOCAL_DIR: ${DATA_PATH}/tts/audio
    volumes:
      - ${DATA_PATH}/tts/audio:${DATA_PATH}/tts/audio
    networks:
      - tools-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  tts-service:
    image: ${TOOLS_IMAGE_PREFIX}/tts-service:${IMAGE_TAG:-latest}
    container_name: tools-tts-service
    restart: unless-stopped
    volumes:
      - ${CONFIG_PATH}/tts-service.yaml:/app/config.yaml:ro
      - ${DATA_PATH}/tts/audio:${DATA_PATH}/tts/audio
    networks:
      - tools-net
      - dream-ai
    ports:
      - "${TTS_SERVICE_PORT:-8088}:8088"
    depends_on:
      tts-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  ffmpeg-service:
    image: ${TOOLS_IMAGE_PREFIX}/ffmpeg-service:${IMAGE_TAG:-latest}
    container_name: tools-ffmpeg-service
    restart: unless-stopped
    volumes:
      - ${CONFIG_PATH}/ffmpeg-service.yaml:/app/config.yaml:ro
      - ${DATA_PATH}/media:${DATA_PATH}/media
    networks:
      - tools-net
      - dream-ai
    ports:
      - "${FFMPEG_SERVICE_PORT:-8089}:8089"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8089/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  tools-net:
    name: tools-net
    driver: bridge
  dream-ai:
    external: true
