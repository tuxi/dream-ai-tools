services:
  tts-worker:
    image: ${TTS_WORKER_IMAGE:-${TOOLS_IMAGE_PREFIX}/tts-worker:${IMAGE_TAG:-latest}}
    container_name: tools-tts-worker
    restart: unless-stopped
    environment:
      STORAGE_LOCAL_DIR: ${DATA_PATH}/tts/audio
    volumes:
      - ${DATA_PATH}/tts/audio:${DATA_PATH}/tts/audio
    networks:
      - tools-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  tts-service:
    image: ${TTS_SERVICE_IMAGE:-${TOOLS_IMAGE_PREFIX}/tts-service:${IMAGE_TAG:-latest}}
    container_name: tools-tts-service
    restart: unless-stopped
    volumes:
      - ${CONFIG_PATH}/tts-service.yaml:/app/config.yaml:ro
      - ${DATA_PATH}/tts/audio:${DATA_PATH}/tts/audio
    networks:
      - tools-net
      - dream-ai
    ports:
      - "${TTS_SERVICE_PORT:-8088}:8088"
    depends_on:
      tts-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  ffmpeg-service:
    image: ${FFMPEG_SERVICE_IMAGE:-${TOOLS_IMAGE_PREFIX}/ffmpeg-service:${IMAGE_TAG:-latest}}
    container_name: tools-ffmpeg-service
    restart: unless-stopped
    volumes:
      - ${CONFIG_PATH}/ffmpeg-service.yaml:/app/config.yaml:ro
      - ${DATA_PATH}/media:${DATA_PATH}/media
      - ${DATA_PATH}/tmp:/tmp
      - ${DATA_PATH}/fonts:/fonts:ro
    networks:
      - tools-net
      - dream-ai
    ports:
      - "${FFMPEG_SERVICE_PORT:-8089}:8089"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8089/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  ocr-service:
    image: ${OCR_SERVICE_IMAGE:-${TOOLS_IMAGE_PREFIX}/ocr-service:${IMAGE_TAG:-latest}}
    container_name: tools-ocr-service
    restart: unless-stopped
    environment:
      XDG_CACHE_HOME: /models/cache
      PADDLE_HOME: /models/paddle
      PADDLEX_HOME: /models/paddlex
      PADDLEOCR_HOME: /models/paddleocr
    volumes:
      - ${CONFIG_PATH}/ocr-service.yaml:/app/config.yaml:ro
      - ${DATA_PATH}/media:${DATA_PATH}/media
      - ${DATA_PATH}/tmp:${DATA_PATH}/tmp
      - ${DATA_PATH}/tmp:/tmp
      - ${DATA_PATH}/models:/models
      - ${DATA_PATH}/models/paddlex:/root/.paddlex
    networks:
      - tools-net
      - dream-ai
    ports:
      - "${OCR_SERVICE_PORT:-8091}:8091"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  asr-service:
    image: ${ASR_SERVICE_IMAGE:-${TOOLS_IMAGE_PREFIX}/asr-service:${IMAGE_TAG:-latest}}
    container_name: tools-asr-service
    profiles:
      - asr
    restart: unless-stopped
    environment:
      XDG_CACHE_HOME: /models/cache
      HF_HOME: /models/huggingface
      HF_HUB_CACHE: /models/huggingface/hub
      MODELSCOPE_CACHE: /models/modelscope
      TORCH_HOME: /models/torch
    volumes:
      - ${CONFIG_PATH}/asr-service.yaml:/app/config.yaml:ro
      - ${DATA_PATH}/media:${DATA_PATH}/media
      - ${DATA_PATH}/tmp:${DATA_PATH}/tmp
      - ${DATA_PATH}/tmp:/tmp
      - ${DATA_PATH}/models:/models
    networks:
      - tools-net
      - dream-ai
    ports:
      - "${ASR_SERVICE_PORT:-8092}:8092"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8092/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  tools-net:
    name: tools-net
    driver: bridge
  dream-ai:
    external: true
