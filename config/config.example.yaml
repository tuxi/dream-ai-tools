server:
  port: 12311
  mode: "debug"
  language: "zh"

log:
  level: "debug"
  format: "json"
  addsource: true

database:
  host: "127.0.0.1"
  port: 5432
  user: "postgres"
  password: "replace-with-your-postgres-password"
  dbname: "dream_log"
  sslmode: "disable"

redis:
  host: "127.0.0.1"
  port: 6379
  password: ""
  db: 0
  poolsize: 10
  minidleconns: 1
  idletimeout: 3000

auth:
  jwtsecret: "replace-with-a-long-random-jwt-secret"
  ttl: 432000
  blacklistperiod: 10

deepseek:
  apikey: "replace-with-your-deepseek-api-key-or-leave-empty"
  baseurl: "https://api.deepseek.com/v1"

openai:
  apikey: "replace-with-your-openai-api-key-or-leave-empty"
  baseurl: "https://api.openai.com/v1"

qwen:
  apikey: "replace-with-your-qwen-api-key-or-leave-empty"
  baseurl: "https://dashscope.aliyuncs.com/compatible-mode/v1"

alioss:
  accesskeyid: "replace-with-your-aliyun-oss-access-key-id"
  accesskeysecret: "replace-with-your-aliyun-oss-access-key-secret"
  endpoint: "oss-cn-beijing.aliyuncs.com"
  bucketregion: "oss-cn-beijing"
  bucketname: "replace-with-your-oss-bucket-name"

alists:
  accesskeyid: "replace-with-your-aliyun-sts-access-key-id"
  accesskeysecret: "replace-with-your-aliyun-sts-access-key-secret"
  endpoint: "oss-cn-beijing.aliyuncs.com"
  bucketregion: "oss-cn-beijing"
  bucketname: "replace-with-your-oss-bucket-name"
  regionid: "cn-beijing"
  rolearn: "replace-with-your-ram-role-arn"

aliyunauth:
  regionid: ""
  accesskeyid: ""
  accesssecret: ""
  signname: ""
  templatecode: ""
  schemename: ""
  codelength: 6
  valid_time_sec: 300
  interval_sec: 60

appleauth:
  teamid: ""
  clientid: ""
  keyid: ""
  privatekey: |
    -----BEGIN PRIVATE KEY-----
    replace-with-your-apple-auth-private-key
    -----END PRIVATE KEY-----

volcengine:
  apikey: "replace-with-your-volcengine-api-key"
  endpoint: "https://ark.cn-beijing.volces.com"

keling:
  accesskey: "replace-with-your-keling-access-key"
  secretkey: "replace-with-your-keling-secret-key"
  endpoint: "https://api-beijing.klingai.com"

appstore:
  issuerid: ""
  keyid: ""
  bundleid: ""
  privatekey: |
    -----BEGIN PRIVATE KEY-----
    replace-with-your-app-store-private-key
    -----END PRIVATE KEY-----
  environment: "sandbox"
  rootcertpem: |
    -----BEGIN CERTIFICATE-----
    replace-with-apple-root-g3-certificate-or-copy-from-deploy/apple_root_g3.pem
    -----END CERTIFICATE-----
  enable_sandbox_fallback: true

tts:
  enabled: true
  edge:
    command: "edge-tts"
  volcengine:
    appid: "replace-with-your-volcengine-tts-appid"
    accesstoken: "replace-with-your-volcengine-tts-access-token"
    secretkey: ""
    voicetype: "BV104_streaming"
    resourceid: "volc.tts_async.default"
    submiturl: "https://openspeech.bytedance.com/api/v1/tts_async/submit"
    queryurl: "https://openspeech.bytedance.com/api/v1/tts_async/query"
    audioformat: "mp3"
    samplerate: 24000
    enable_subtitle: 1
    price_per_10k_chars: 3.0
    submit_timeout_ms: 15000
    wait_timeout_ms: 90000
    poll_interval_ms: 2000
