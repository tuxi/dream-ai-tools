services:
  app:
    image: ${APP_IMAGE:-ghcr.io/tuxi/dream-ai:latest}
    container_name: ${APP_CONTAINER_NAME:-dream-ai-app}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-12210}:12210"
    volumes:
      - ${APP_CONFIG_PATH:-./config/config.yaml}:/app/config/config.yaml:ro
      - ${APP_DEPLOY_PATH:-./deploy}:/app/deploy:ro
      - tts-audio:/data/tts/audio
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/config/config.yaml && test -f /app/deploy/rsa_private.pem && test -f /app/deploy/rsa_public.pem"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dream-ai
      - tts-net

  postgres:
    image: pgvector/pgvector:pg17
    container_name: ${POSTGRES_CONTAINER_NAME:-dream-ai-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dream_log}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dream-ai

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-dream-ai-redis}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${REDIS_DATA_PATH:-./data/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dream-ai

networks:
  dream-ai:
    driver: bridge
  tts-net:
    external: true

volumes:
  tts-audio:
    external: true
